name: CI/CD Pipeline - Biblioteca CQRS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  DOCKER_IMAGE: leounisabana/biblioteca-cqrs
  DEPLOY_REPO: LeoUnisabana/biblioteca-cqrs-deploy
  DEPLOY_VALUES_FILE: helm/biblioteca-chart/values-dev.yaml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar tests
        run: ./mvnw clean test

      - name: Compilar aplicación
        run: ./mvnw package -DskipTests

      - name: Generar tag de versión
        id: version
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION="1.0.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Nueva versión: ${VERSION}"

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Checkout repositorio de deploy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: deploy-repo

      - name: Actualizar tag de imagen en values-dev.yaml
        run: |
          cd deploy-repo
          sed -i "s|tag:.*|tag: \"${{ steps.version.outputs.VERSION }}\"|g" ${{ env.DEPLOY_VALUES_FILE }}
          echo "Nueva configuración de imagen:"
          grep -A 2 "image:" ${{ env.DEPLOY_VALUES_FILE }}

      - name: Commit y Push al repositorio de deploy
        run: |
          cd deploy-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ${{ env.DEPLOY_VALUES_FILE }}
          git commit -m "🚀 Update image tag to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push

      - name: Resumen del despliegue
        run: |
          echo "✅ CI/CD Pipeline completado"
          echo "📦 Imagen Docker: ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}"
          echo "🎯 ArgoCD detectará el cambio automáticamente"
          echo "⏱️ Tiempo estimado de sincronización: 2-3 minutos"